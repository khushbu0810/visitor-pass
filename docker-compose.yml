  visitor-service:
    container_name: visitormicroservice
    build:
      context: .
      dockerfile: VisitorMicroservice/Dockerfile
    image: visitormicroservice:latest
    ports:
      - "8081:8080"
    depends_on:
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/test
      SPRING_DATASOURCE_USERNAME: mzbQTLZR5eggo1T.root
      SPRING_DATASOURCE_PASSWORD: jowJ78iVg2iad6Zr
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_SQL_INIT_MODE: always
#      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: visitorpass-kahlwt08-d6f2.e.aivencloud.com:10663
      KAFKA_KEYSTORE_PASSWORD: visitorpass123
      KAFKA_TRUSTSTORE_PASSWORD: visitorpass123
    networks:
      - kafka-network

  pass-service:
    container_name: passmicroservice
    build:
      context: .
      dockerfile: passMicroservice/Dockerfile
    image: passmicroservice:latest
    ports:
      - "8082:8080"
    depends_on:
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/test
      SPRING_DATASOURCE_USERNAME: mzbQTLZR5eggo1T.root
      SPRING_DATASOURCE_PASSWORD: jowJ78iVg2iad6Zr
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_SQL_INIT_MODE: always
#      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      VISITOR_SERVICE_URL: http://visitor-service:8080
      SPRING_KAFKA_BOOTSTRAP_SERVERS: visitorpass-kahlwt08-d6f2.e.aivencloud.com:10663
      KAFKA_KEYSTORE_PASSWORD: visitorpass123
      KAFKA_TRUSTSTORE_PASSWORD: visitorpass123
    networks:
      - kafka-network

  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID= 1
      - KAFKA_PROCESS_ROLES= controller,broker
      - KAFKA_LISTENERS= PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS= PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES= CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR= 1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR= 1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR= 1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS= 0
      - KAFKA_KRAFT_CLUSTER_ID=WnLkTHhkQaiJbwP8FClPhw
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    volumes:
      - C:/Users/kahlw_behzt3r/OneDrive/Desktop/volumes/server-1:/var/lib/kafka/data
    networks:
      - kafka-network

networks:
  kafka-network:
    driver: bridge